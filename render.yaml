databases:
  - name: auto-check-db
    databaseName: alchemist_prices
    plan: free

services:
  - type: web
    runtime: python
    name: auto-check
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: auto-check-db
          property: connectionString
      - key: API_SECRET
        generateValue: true
